name: Security

# SBOMs are generated per-release (see .goreleaser.yaml). This workflow re-scans
# dependencies on a schedule so newly-disclosed CVEs against unchanged deps are
# caught even when nothing in the repo changed.

on:
  schedule:
    - cron: '17 6 * * 1'  # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: macos-latest  # CGO_ENABLED=1 required; lima/vz links against macOS frameworks
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        env:
          CGO_ENABLED: "1"
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
