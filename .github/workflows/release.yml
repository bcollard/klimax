name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # needed to create the GitHub release and upload assets

jobs:
  release:
    runs-on: macos-latest  # ARM64; macOS system clang cross-compiles to amd64 transparently
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0  # full history so goreleaser can generate the changelog

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Collect third-party licenses
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses save ./cmd/klimax \
            --save_path=.third_party_licenses \
            --force

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.2.1
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
