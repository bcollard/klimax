name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  build:
    runs-on: macos-latest  # CGO_ENABLED=1 required; lima/vz links against macOS frameworks
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build ./...

      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test ./...

      - name: Vet
        env:
          CGO_ENABLED: "1"
        run: go vet ./...

      - name: License check
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses check ./... \
            --allowed_licenses=MIT,ISC,BSD-2-Clause,BSD-3-Clause,Apache-2.0,MPL-2.0

      - name: GoReleaser check
        uses: goreleaser/goreleaser-action@v7.2.1
        with:
          version: latest
          args: check
