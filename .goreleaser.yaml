version: 2

project_name: klimax

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/klimax
    binary: klimax
    # CGO_ENABLED=1 is required: Lima's instance/store packages call into
    # macOS frameworks (Virtualization.framework) at link time on darwin.
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    # macOS system clang handles cross-compilation between amd64/arm64
    # without extra CC flags — the universal SDK covers both targets.
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    hooks:
      post:
        # Embed the com.apple.security.virtualization entitlement required to
        # create VMs via Virtualization.framework.
        # For production releases, replace "-" with your Developer ID certificate
        # identity and add a notarize step; otherwise Gatekeeper will block the binary.
        - cmd: codesign --sign - --entitlements entitlements.plist --force "{{ .Path }}"

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: ["tar.gz"]
    files:
      - LICENSE
      - README.md
      - config.example.yaml
      - entitlements.plist
      - src: .third_party_licenses/**/*
        dst: third_party_licenses
        strip_parent: true

checksum:
  name_template: checksums.txt

# Generate an SPDX SBOM (via syft) for each release archive and attach it to the
# GitHub release. syft is installed by the release workflow (anchore/sbom-action).
sboms:
  - artifacts: archive

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

homebrew_casks:
  - name: klimax
    binaries: ["klimax"]
    repository:
      owner: bcollard
      name: homebrew-klimax
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/bcollard/klimax
    description: Lima-based macOS VZ VM + multi-kind cluster manager
    caveats: |
      klimax bakes a specific kind CLI and default Kubernetes node image into the
      VM at creation time. Upgrading the klimax binary does NOT re-provision an
      existing VM, so after upgrading you should rebuild it:

        klimax destroy && klimax up

      Then recreate your clusters (klimax cluster create <name>). Skipping this can
      leave you on an older kind that cannot create the new default node version.
    directory: Casks
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
